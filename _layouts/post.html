---
layout: default
---

<article>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <span>📅 {{ page.date | date: "%Y년 %m월 %d일" }}</span>
      <span>📂 <a href="/categories/{{ page.category }}">{{ page.category }}</a></span>
      {% if page.author %}
        <span>✍️ {{ page.author }}</span>
      {% endif %}
    </div>
    {% if page.tags %}
      <div class="tags">
        {% for tag in page.tags %}
          <a href="#" class="tag">#{{ tag }}</a>
        {% endfor %}
      </div>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer" style="border-top: 2px solid var(--border-color); padding-top: 2rem; margin-top: 3rem;">
    <div style="background: #f9fafb; padding: 1.5rem; border-radius: 0.5rem; margin: 2rem 0;">
      <h3 style="margin-top: 0; color: var(--text-dark);">다른 포스트 읽기</h3>
      <a href="/blog/" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">← 블로그로 돌아가기</a>
    </div>
  </footer>
</article>

<!-- Utterances 댓글 섹션 -->
<section style="margin-top: 3rem; padding-top: 2rem; border-top: 2px solid var(--border-color);">
  <h2 style="margin-bottom: 1.5rem;">💬 댓글</h2>
  <script src="https://utteranc.es/client.js"
    repo="ms-axd/ms-axd.github.io"
    issue-term="pathname"
    theme="github-light"
    crossorigin="anonymous"
    async>
  </script>
</section>

<script>
  // 다크 모드에서 Utterances 테마 변경
  const observer = new MutationObserver(function() {
    const isDarkMode = document.body.classList.contains('dark-mode');
    const utteranceFrame = document.querySelector('.utterances-frame');
    if (utteranceFrame) {
      utteranceFrame.style.colorScheme = isDarkMode ? 'dark' : 'light';
    }
  });

  observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
</script>
