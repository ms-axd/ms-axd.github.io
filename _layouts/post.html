---
layout: default
---

<article>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <span>{{ page.date | date: "%Y.%m.%d" }}</span>
      <span>{{ page.category }}</span>
      {% if page.author %}
        <span>{{ page.author }}</span>
      {% endif %}
    </div>
    {% if page.tags %}
      <div class="tags">
        {% for tag in page.tags %}
          <a href="{{ '/tags/' | relative_url }}#{{ tag | escape }}" class="tag">#{{ tag }}</a>
        {% endfor %}
      </div>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
