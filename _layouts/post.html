---
layout: default
---

<article>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <div class="post-meta">
      <span>{{ page.date | date: "%Y.%m.%d" }}</span>
      <span>{{ page.category }}</span>
      {% if page.author %}
        <span>{{ page.author }}</span>
      {% endif %}
    </div>
    {% if page.tags %}
      <div class="tags">
        {% for tag in page.tags %}
          <a href="{{ '/tags/' | relative_url }}#{{ tag | escape }}" class="tag">#{{ tag }}</a>
        {% endfor %}
      </div>
    {% endif %}
  </header>

  <div class="post-body">
    <div class="post-content">
      {{ content }}
    </div>

    <aside class="post-toc" aria-label="On this page" data-post-toc hidden>
      <div class="post-toc__title">On this page</div>
      <nav class="post-toc__list" data-post-toc-list></nav>
    </aside>
  </div>
</article>

<button type="button" class="post-top-button" data-post-top aria-label="제일 위로 가기">
  TOP
</button>
