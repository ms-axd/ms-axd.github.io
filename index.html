---
layout: default
title: 홈
---

<section style="text-align: center; padding: 3rem 0;">
  <h2 style="font-size: 2rem; margin-bottom: 1rem; background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">
    환영합니다! 👋
  </h2>
  <p style="font-size: 1.1rem; color: #6b7280; margin-bottom: 2rem;">
    개발, 보안, 일상을 기록하는 블로그입니다.
  </p>
  <a href="/blog/" style="display: inline-block; background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%); color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; text-decoration: none; font-weight: 600;">
    📝 블로그 보러 가기
  </a>
</section>

<div class="search-container">
  <div class="search-box">
    <input type="text" placeholder="포스트 검색... (제목, 내용, 태그)">
    <div class="search-results" style="display: none;"></div>
  </div>
</div>

<section>
  <h2 style="margin: 3rem 0 2rem; font-size: 1.8rem; color: var(--primary-color);">최신 포스트</h2>
  <div class="posts-grid">
    {% for post in site.posts | limit: 6 %}
      <div class="post-card">
        <h2><a href="{{ post.url }}" style="color: var(--primary-color); text-decoration: none;">{{ post.title }}</a></h2>
        <div class="post-meta">
          <span>📅 {{ post.date | date: "%Y.%m.%d" }}</span>
          <span class="post-category">{{ post.category }}</span>
        </div>
        <p class="post-excerpt">{{ post.excerpt | strip_html | truncatewords: 30 }}</p>
        <a href="{{ post.url }}" class="read-more">더 읽기 →</a>
      </div>
    {% endfor %}
  </div>
</section>

<div style="text-align: center; margin-top: 3rem;">
  <a href="/blog/" style="display: inline-block; background: var(--primary-color); color: white; padding: 0.75rem 2rem; border-radius: 0.5rem; text-decoration: none; font-weight: 600; transition: var(--transition);">
    모든 포스트 보기 →
  </a>
</div>
